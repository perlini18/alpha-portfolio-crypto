services:
  db:
    image: postgres:16
    container_name: crypto_tracker_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: tracker
      POSTGRES_PASSWORD: trackerpass
      POSTGRES_DB: trackerdb
    ports:
      - "5432:5432"
    volumes:
      - crypto_tracker_pg:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

volumes:
  crypto_tracker_pg:
